 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML Copy Panel</title>

<style>
body{
    background:#000;
    font-family:Arial, sans-serif;
    color:#fff;
    text-align:center;
}
h1{
    color:#00ffcc;
    margin-top:20px;
}
.container{
    width:95%;
    margin:auto;
}
input{
    padding:8px;
    margin:10px;
    width:200px;
    border-radius:5px;
    border:none;
}
button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.share-btn{
    background:#00ffcc;
}
.undo-btn{
    background:#ff4444;
    color:#fff;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    border:1px solid #333;
    padding:8px;
    cursor:pointer;
}
th{
    background:#111;
    color:#00ffcc;
}
td.green{
    background:green;
}
.copied-msg{
    margin-top:15px;
    color:#00ff00;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Copy Panel</h1>

<div class="container">

<input type="number" id="filterInput" placeholder="Filter Serial Number">
<button onclick="applyFilter()">Filter</button>
<button class="share-btn" onclick="generateLink()">Generate Share Link</button>

<table id="dataTable">
<thead>
<tr>
<th>Serial</th>
<th>Username</th>
<th>Password</th>
<th>Undo</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="copied-msg" id="copiedMsg"></div>

</div>

<script>

const data = `1409	CN032526091
4657	CN032540674
7912	CN042501783
6925	CN052539786
4150	CN052540143
2139	CN052563513
1750	CN062507669
4733	CN062517650
2307	CN062518288
2654	CN062519985
3664	CN062584721
7065	CN062584773
6820	CN062584796
4432	CN062585258
5010	CN072532532
1916	CN062508583
4752	CN0625122888
1525	CN062525043
7572	CN052540901
2084	CN062547733
4456	CN062594025
6155	CN072522062
4483	CN072581104
3287	CN092519878
5304	CN092520699
6930	CN092520797
4593	CN092520826
9348	CN092520954`;

const rows = data.trim().split("\n");
const tbody = document.querySelector("#dataTable tbody");

rows.forEach((row,i)=>{
    const cols = row.split("\t");
    const tr = document.createElement("tr");

    tr.innerHTML = `
        <td>${i+1}</td>
        <td onclick="copyCell(this)">${cols[0]}</td>
        <td onclick="copyCell(this)">${cols[1]}</td>
        <td><button class="undo-btn" onclick="undoRow(this)">Undo</button></td>
    `;
    tbody.appendChild(tr);
});

function copyCell(cell){
    navigator.clipboard.writeText(cell.innerText);
    cell.classList.add("green");
    document.getElementById("copiedMsg").innerText="✔ Copied";
    updateURL();
}

function undoRow(btn){
    const row = btn.closest("tr");
    row.querySelectorAll("td").forEach(td=>{
        td.classList.remove("green");
    });
    updateURL();
}

function applyFilter(){
    const val = document.getElementById("filterInput").value;
    const trs = tbody.querySelectorAll("tr");
    trs.forEach(tr=>{
        const serial = tr.children[0].innerText;
        tr.style.display = (val==="" || serial===val) ? "" : "none";
    });
}

function updateURL(){
    const greenCells = [];
    document.querySelectorAll("td.green").forEach(td=>{
        const row = td.parentElement.rowIndex;
        const col = td.cellIndex;
        greenCells.push(row+"-"+col);
    });
    const url = window.location.pathname + "?selected=" + greenCells.join(",");
    history.replaceState(null,null,url);
}

window.onload=function(){
    const params = new URLSearchParams(window.location.search);
    if(params.get("selected")){
        const items = params.get("selected").split(",");
        items.forEach(item=>{
            const [r,c]=item.split("-");
            const cell=document.querySelector(`table tr:nth-child(${r}) td:nth-child(${parseInt(c)+1})`);
            if(cell) cell.classList.add("green");
        });
    }
}

function generateLink(){
    updateURL();
    alert("Share this URL from address bar");
}

</script>

</body>
</html>
